services:
  - type: web
    name: heatwave-ai-backend
    env: docker
    dockerfilePath: ./Heatwave-AI-Backend-Elysia/Dockerfile.render
    dockerContext: ./Heatwave-AI-Backend-Elysia
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    healthCheckPath: /api/health
    autoDeploy: true
