version: '3.8'

services:
  backend:
    build:
      context: ./Heatwave-AI-Backend-Elysia
      dockerfile: Dockerfile.render
    ports:
      - "3000:3000"
    volumes:
      - ./Heatwave-AI-Backend-Elysia/experiments:/app/experiments
    environment:
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
